{% extends "base.html" %}

{% block content %}
  <section class="section-header">
    <div>
      <p class="eyebrow">New Project</p>
      <h2>Create a roofing takeoff workspace</h2>
    </div>
  </section>

  <section class="panel form-panel">
    <form class="form-grid" method="post">
      <label>
        <span>Project name</span>
        <input type="text" name="name" value="{{ form.get('name', '') }}" required>
      </label>
      <label>
        <span>Client name</span>
        <input type="text" name="client_name" value="{{ form.get('client_name', '') }}" required>
      </label>
      <label>
        <span>Project type</span>
        <select name="project_type">
          {% for option in project_types %}
            <option value="{{ option }}" {% if form.get('project_type') == option %}selected{% endif %}>{{ option }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        <span>Primary roof system</span>
        <select name="roof_system">
          {% for option in supported_systems %}
            <option value="{{ option }}" {% if form.get('roof_system') == option %}selected{% endif %}>{{ option }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="field-span-2">
        <span>Project address</span>
        <input type="text" name="address" value="{{ form.get('address', '') }}" required>
      </label>
      <label>
        <span>Estimator</span>
        <select name="estimator_name">
          <option value="">Choose estimator</option>
          {% for member in members %}
            <option value="{{ member['full_name'] }}" {% if form.get('estimator_name') == member['full_name'] %}selected{% endif %}>{{ member["full_name"] }} • {{ member["role_name"] }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        <span>Bid date</span>
        <input type="date" name="bid_date" value="{{ form.get('bid_date', '') }}">
      </label>
      <label>
        <span>Internal due date</span>
        <input type="date" name="due_date" value="{{ form.get('due_date', '') }}">
      </label>
      <label class="field-span-2">
        <span>Notes</span>
        <textarea name="notes" rows="5" placeholder="Scope notes, assumptions, or client constraints">{{ form.get('notes', '') }}</textarea>
      </label>

      <div class="form-actions field-span-2">
        <a class="button button-secondary" href="{{ url_for('web.project_index') }}">Cancel</a>
        <button class="button" type="submit">Create RidgeFlow Project</button>
      </div>
    </form>
  </section>
{% endblock %}
